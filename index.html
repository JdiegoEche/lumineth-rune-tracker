<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumineth Realm-lords — Battle Scripture</title>
    <meta name="description" content="Tracker interactivo de runas para Lumineth Realm-lords en Age of Sigmar. Planifica y visualiza sinergias de tu Battle Scripture.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <!-- ═══ HEADER ═══ -->
    <header class="header">
        <div class="header-glow"></div>
        <div class="lang-toggle" id="lang-toggle" title="Cambiar idioma / Switch language">
            <button class="lang-btn active" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <div class="lang-slider"></div>
        </div>
        <p class="subtitle">Lumineth Realm-lords</p>
        <h1 class="title">Battle Scripture</h1>
        <p class="tagline" id="tagline">Sistema de Runas — Depict Rune Tracker</p>
    </header>

    <!-- ═══ SCRIPTURE GRID ═══ -->
    <section class="scripture-section" id="scripture-section">
        <div class="rounds-row" id="rounds-row">
            <!-- 5 round diamonds rendered by JS -->
        </div>
        <div class="teclis-row" id="teclis-row">
            <!-- Teclis diamond rendered by JS -->
        </div>
        <div class="scripture-hint">
            <span class="hint-icon">💡</span>
            <span class="hint-text">Haz clic en un diamante para inscribir una runa</span>
        </div>
    </section>

    <!-- ═══ SYNERGY MAP ═══ -->
    <section class="synergy-section" id="synergy-section">
        <h2 class="section-title">
            <span class="section-icon">⚡</span>
            <span class="section-text">Mapa de Sinergias</span>
        </h2>
        <div class="synergy-matrix" id="synergy-matrix">
            <!-- Rendered by JS -->
        </div>
    </section>

    <!-- ═══ EFFECTS PANEL ═══ -->
    <section class="effects-section" id="effects-section">
        <div class="effects-header">
            <h2 class="section-title">
                <span class="section-icon">📜</span>
                <span class="section-text">Efectos Activos</span>
            </h2>
            <div class="effects-stats" id="effects-stats"></div>
        </div>
        <div class="effects-grid" id="effects-grid">
            <!-- Rendered by JS -->
        </div>
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">◇</div>
            <p>Tu Battle Scripture está vacía</p>
            <p class="empty-sub">Selecciona una runa en los diamantes de arriba para comenzar</p>
        </div>
    </section>

    <!-- ═══ CONTROLS ═══ -->
    <div class="controls">
        <button class="btn-reset" id="btn-reset" title="Reiniciar Scripture">
            <span class="btn-icon">↺</span>
            <span class="btn-label">Reiniciar Scripture</span>
        </button>
    </div>
</div>

<!-- ═══ RUNE SELECTION MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modal-title">Seleccionar Runa</h3>
            <button class="modal-close" id="modal-close" title="Cerrar">✕</button>
        </div>
        <div class="modal-body">
            <div class="rune-options" id="rune-options">
                <!-- Rendered by JS -->
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-clear" id="btn-clear">
                <span class="btn-icon">✕</span>
                <span class="btn-label">Vaciar Espacio</span>
            </button>
            <button class="btn-cancel" id="btn-cancel">Cancelar</button>
        </div>
    </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══ TEMPLATES ═══ -->
<template id="rune-option-template">
    <div class="rune-option" data-rune="">
        <div class="rune-option-icon rune-card-icon"></div>
        <div class="rune-option-info">
            <div class="rune-option-name"></div>
            <div class="rune-option-subtitle"></div>
            <div class="rune-option-desc"></div>
        </div>
        <div class="rune-option-arrow">→</div>
    </div>
</template>

<template id="rune-card-template">
    <div class="rune-card">
        <div class="rune-card-header">
            <div class="rune-card-icon"></div>
            <div class="rune-card-title-group">
                <div class="rune-card-name"></div>
                <div class="rune-card-subtitle"></div>
            </div>
        </div>
        <div class="effect-list">
            <div class="effect-item base">
                <span class="effect-icon">✦</span>
                <div class="effect-text"></div>
            </div>
        </div>
    </div>
</template>

<template id="effect-item-template">
    <div class="effect-item">
        <span class="effect-icon"></span>
        <div class="effect-text"></div>
    </div>
</template>

<template id="stat-badge-template">
    <div class="stat-badge">
        <span class="stat-label"></span>
        <span class="stat-value"></span>
    </div>
</template>

<template id="inscribed-runes-bar">
    <div class="inscribed-runes-bar">
        <span class="inscribed-runes-list"></span>
    </div>
</template>

<template id="synergy-table-template">
    <table class="synergy-table">
        <thead><tr>
            <th></th>
            <th class="rune-header" data-col="varinor">Varinor</th>
            <th class="rune-header" data-col="alaithi">Alaithi</th>
            <th class="rune-header" data-col="ydriliqi">Ydriliqi</th>
            <th class="rune-header" data-col="oreali">Oreali</th>
        </tr></thead>
        <tbody>
            <tr data-row="varinor">
                <td class="row-header">Varinor</td>
                <td><div class="synergy-cell diagonal">—</div></td>
                <td><div class="synergy-cell" data-cell="varinor_alaithi"></div></td>
                <td><div class="synergy-cell" data-cell="varinor_ydriliqi"></div></td>
                <td><div class="synergy-cell" data-cell="varinor_oreali"></div></td>
            </tr>
            <tr data-row="alaithi">
                <td class="row-header">Alaithi</td>
                <td><div class="synergy-cell" data-cell="alaithi_varinor"></div></td>
                <td><div class="synergy-cell diagonal">—</div></td>
                <td><div class="synergy-cell" data-cell="alaithi_ydriliqi"></div></td>
                <td><div class="synergy-cell" data-cell="alaithi_oreali"></div></td>
            </tr>
            <tr data-row="ydriliqi">
                <td class="row-header">Ydriliqi</td>
                <td><div class="synergy-cell" data-cell="ydriliqi_varinor"></div></td>
                <td><div class="synergy-cell" data-cell="ydriliqi_alaithi"></div></td>
                <td><div class="synergy-cell diagonal">—</div></td>
                <td><div class="synergy-cell" data-cell="ydriliqi_oreali"></div></td>
            </tr>
            <tr data-row="oreali">
                <td class="row-header">Oreali</td>
                <td><div class="synergy-cell" data-cell="oreali_varinor"></div></td>
                <td><div class="synergy-cell" data-cell="oreali_alaithi"></div></td>
                <td><div class="synergy-cell" data-cell="oreali_ydriliqi"></div></td>
                <td><div class="synergy-cell diagonal">—</div></td>
            </tr>
        </tbody>
    </table>
</template>

<script src="app.js"></script>
</body>
</html>
